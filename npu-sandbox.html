<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPU Architecture Sandbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Noto Sans SC', sans-serif;
    background: #fafafa;
    color: #1d1d1f;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .sandbox-header {
    text-align: center;
    padding: 40px 24px 24px;
  }
  .sandbox-header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1d1d1f;
  }
  .sandbox-header p {
    font-size: 1.05rem;
    color: #86868b;
    margin-top: 8px;
    font-weight: 400;
  }

  /* ── Chip Selector Tabs ── */
  .chip-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 24px 32px;
    flex-wrap: wrap;
  }
  .chip-tab {
    padding: 8px 20px;
    border-radius: 980px;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: #e8e8ed;
    color: #1d1d1f;
    transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .chip-tab:hover {
    background: #d2d2d7;
  }
  .chip-tab.active {
    background: #1d1d1f;
    color: #fff;
  }

  /* ── Main Architecture View ── */
  .arch-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 40px;
  }
  .arch-wrapper {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  /* ── SVG Architecture ── */
  .arch-svg {
    width: 100%;
    height: auto;
  }
  .arch-svg .module {
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .arch-svg .module:hover {
    filter: brightness(0.95);
  }
  .arch-svg .module:hover .module-bg {
    stroke: #0071e3;
    stroke-width: 2;
  }
  .arch-svg .module.active .module-bg {
    stroke: #0071e3;
    stroke-width: 2.5;
    filter: drop-shadow(0 0 6px rgba(0,113,227,0.3));
  }
  .arch-svg .module-bg {
    rx: 10;
    ry: 10;
    transition: all 0.3s;
  }
  .arch-svg .module-label {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    font-size: 12px;
    font-weight: 600;
    fill: #1d1d1f;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .arch-svg .module-sublabel {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    font-size: 9.5px;
    font-weight: 400;
    fill: #86868b;
    pointer-events: none;
    text-anchor: middle;
  }
  .arch-svg .bus-line {
    stroke: #d2d2d7;
    stroke-width: 2;
    fill: none;
    transition: stroke 0.4s;
  }
  .arch-svg .bus-line.active {
    stroke: #0071e3;
    stroke-width: 3;
  }
  .arch-svg .bus-arrow {
    fill: #d2d2d7;
    transition: fill 0.4s;
  }
  .arch-svg .bus-arrow.active {
    fill: #0071e3;
  }
  .arch-svg .data-dot {
    fill: #0071e3;
    opacity: 0;
  }
  .arch-svg .data-dot.animating {
    opacity: 1;
  }

  /* ── Detail Panel ── */
  .detail-panel {
    margin-top: 24px;
    background: #f5f5f7;
    border-radius: 16px;
    padding: 24px 28px;
    min-height: 120px;
    transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .detail-panel.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #86868b;
    font-size: 0.95rem;
  }
  .detail-title {
    font-size: 1.15rem;
    font-weight: 600;
    color: #1d1d1f;
    margin-bottom: 4px;
  }
  .detail-desc {
    font-size: 0.9rem;
    color: #6e6e73;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .detail-params {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .detail-param {
    background: #fff;
    border-radius: 12px;
    padding: 12px 16px;
  }
  .detail-param-label {
    font-size: 0.75rem;
    color: #86868b;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .detail-param-value {
    font-size: 1.1rem;
    font-weight: 600;
    color: #1d1d1f;
    margin-top: 2px;
  }
  .detail-param-note {
    font-size: 0.75rem;
    color: #86868b;
    margin-top: 2px;
  }

  /* ── Chip Overview Stats ── */
  .chip-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .chip-stat {
    text-align: center;
    padding: 12px 8px;
    background: #f5f5f7;
    border-radius: 12px;
  }
  .chip-stat-value {
    font-size: 1.3rem;
    font-weight: 700;
    color: #0071e3;
  }
  .chip-stat-label {
    font-size: 0.72rem;
    color: #86868b;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-weight: 500;
  }

  /* ── Data Flow Animation ── */
  @keyframes flowDot {
    0% { offset-distance: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sandbox-header h1 { font-size: 1.5rem; }
    .chip-stats { grid-template-columns: repeat(2, 1fr); }
    .arch-wrapper { padding: 16px; }
    .detail-params { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

  <div class="detail-panel empty" id="detailPanel">

let currentChip = 'tesla';
let activeModule = null;

// ── Render Chip Tabs ──
function renderTabs() {
  const tabs = document.getElementById('chipTabs');
  tabs.innerHTML = '';
  Object.keys(chips).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'chip-tab' + (key === currentChip ? ' active' : '');
    btn.textContent = chips[key].name;
    btn.onclick = () => { currentChip = key; activeModule = null; render(); };
    tabs.appendChild(btn);
  });
}

// ── Render Stats ──
function renderStats() {
  const el = document.getElementById('chipStats');
  el.innerHTML = chips[currentChip].stats.map(s =>
    `<div class="chip-stat"><div class="chip-stat-value">${s.value}</div><div class="chip-stat-label">${s.label}</div></div>`
  ).join('');
}

// ── Render Architecture SVG ──
function renderArch() {
  const svg = document.getElementById('archSvg');
  const chip = chips[currentChip];
  let html = '';

  // Render buses first (behind modules)
  if (chip.buses) {
    chip.buses.forEach((b, i) => {
      html += `<path class="bus-line" id="bus-${i}" d="${b.path}" marker-end="url(#arrow)"/>`;
    });
  }

  // Arrow marker
  html += `<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path class="bus-arrow" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs>`;

  // Render modules
  Object.keys(chip.modules).forEach(key => {
    const m = chip.modules[key];
    const isActive = activeModule === key;
    html += `<g class="module${isActive ? ' active' : ''}" data-key="${key}" onclick="selectModule('${key}')">
      <rect class="module-bg" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" fill="${m.color}" stroke="${isActive ? '#0071e3' : '#e5e5ea'}" stroke-width="${isActive ? 2.5 : 1}"/>
      <text class="module-label" x="${m.x + m.w/2}" y="${m.y + m.h/2 - 6}">${m.label}</text>
      ${m.sub ? `<text class="module-sublabel" x="${m.x + m.w/2}" y="${m.y + m.h/2 + 10}">${m.sub}</text>` : ''}
    </g>`;
  });

  // Right side info section
  html += `<text x="620" y="30" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#86868b">DATA FLOW</text>`;
  html += `<text x="620" y="48" font-family="-apple-system,sans-serif" font-size="10" fill="#aeaeb2">DDR → SRAM → MAC → Post</text>`;

  // Data flow visualization
  const flowSteps = ['DDR → DMA', 'DMA → SRAM', 'SRAM → MAC', 'MAC → Activation', 'Activation → Post'];
  flowSteps.forEach((step, i) => {
    html += `<rect x="620" y="${60 + i*28}" width="190" height="24" rx="12" fill="#f5f5f7" class="flow-step" data-step="${i}"/>`;
    html += `<text x="715" y="${60 + i*28 + 16}" font-family="-apple-system,sans-serif" font-size="10" fill="#6e6e73" text-anchor="middle">${step}</text>`;
  });

  svg.innerHTML = html;
}

// ── Select Module ──
function selectModule(key) {
  activeModule = activeModule === key ? null : key;
  renderArch();
  renderDetail();
  highlightBuses(key);
}

// ── Highlight Connected Buses ──
function highlightBuses(key) {
  const chip = chips[currentChip];
  if (!chip.buses) return;
  chip.buses.forEach((b, i) => {
    const el = document.getElementById('bus-' + i);
    if (el && (b.from === key || b.to === key)) {
      el.classList.add('active');
    } else if (el) {
      el.classList.remove('active');
    }
  });
}

// ── Render Detail Panel ──
function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (!activeModule) {
    panel.className = 'detail-panel empty';
    panel.innerHTML = '👆 点击上方架构图中的模块查看详细信息';
    return;
  }
  const m = chips[currentChip].modules[activeModule];
  panel.className = 'detail-panel';
  let paramsHtml = '';
  if (m.params) {
    paramsHtml = '<div class="detail-params">' + m.params.map(p =>
      `<div class="detail-param">
        <div class="detail-param-label">${p.label}</div>
        <div class="detail-param-value">${p.value}</div>
        ${p.note ? `<div class="detail-param-note">${p.note}</div>` : ''}
      </div>`
    ).join('') + '</div>';
  }
  panel.innerHTML = `<div class="detail-title">${m.label}</div><div class="detail-desc">${m.desc}</div>${paramsHtml}`;
}

// ── Render All ──
function render() {
  renderTabs();
  renderStats();
  renderArch();
  renderDetail();
}

// ── Initialize ──
render();
</script>
